<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="javascript.js" defer></script>
    <link rel="stylesheet" href="style.css">

    <!--  links to Sixtyfour Convergence font of google fonts-->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Jersey+10&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <h1>Rock . Paper . Scissors</h1>
    </header>

    <main>
        <div class="content">
            <button class="play-button">Start playing</button>
            <div class="gameplay-content">
                <h1>Your turn, Choose!</h1>
                <div class="choices-cards">
                    <div class="card">
                        <img src="images/rock.png" alt="" width="250px" height="auto">
                        <p>ROCK!</p>
                    </div>

                    <div class="card">
                        <img src="images/paper.png" alt="" width="250px" height="auto">
                        <p>PAPER</p>
                    </div>

                    <div class="card">
                        <img src="images/rock.png" alt="" width="250px" height="auto">
                        <p>SCISSORS</p>
                    </div>
                </div>
                <div class="score">
                    <p>Computer Score: 0</p>
                    <p class="note">First to reach score 5 win! Good luck</p>
                    <p>Player Score: 0</p>
                </div>
                <div class="results"></div>
            </div>
        </div>
    </main>

    <footer>
        <p>Copyright@ doesn't really matter</p>
    </footer>
    
</body>
</html>
